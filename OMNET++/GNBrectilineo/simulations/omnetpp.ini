[General]
sim-time-limit = 1000s

# Configuración del Binder
#*.binder.numChannels = 1

# Configuración del Channel Control
#*.channelControl.pMax = 10W
#*.channelControl.alpha = 1.0
#*.channelControl.carrierFrequency = 2GHz

[Config MobileNetwork]
network = gnbrectilineo.MobileGNB

[Config Update]
**.mobility.updateInterval = 0.1s

[Config Area]
# Área de simulación extendida
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 1200m
**.constraintAreaMaxY = 800m
**.constraintAreaMaxZ = 0m

[Config Visualization]
# Configuración del visualizador
*.visualizer.*.mobilityVisualizer.displayMovements = true
*.visualizer.*.mobilityVisualizer.displayVelocities = true
*.visualizer.*.mobilityVisualizer.displayOrientations = true
*.visualizer.*.mobilityVisualizer.moduleFilter = "*.gNodeB[*]"
*.visualizer.*.mobilityVisualizer.trail.visible = true
*.visualizer.*.mobilityVisualizer.trail.lineWidth = 2

# ============================================================================
# CONFIGURACIÓN 1: UN SOLO gNodeB CON MOVILIDAD LINEAL
# ============================================================================
[Config SingleLinearMobility]
extends = Area, MobileNetwork, Update, Visualization

# Un solo gNodeB
*.numGnbs = 1

# Configuración de movilidad lineal
*.gNodeB[0].mobility.typename = "LinearMobility"
*.gNodeB[0].mobility.initFromDisplayString = false
*.gNodeB[0].mobility.speed = 20mps
*.gNodeB[0].mobility.initialMovementHeading = 45deg
*.gNodeB[0].mobility.initialX = 100m
*.gNodeB[0].mobility.initialY = 100m
*.gNodeB[0].mobility.initialZ = 0m

# Configuración de cobertura
*.gNodeB[0].coverageRange = 300m
*.gNodeB[0].coverageColor = "#0000ff"
*.gNodeB[0].coverageOpacity = 0.2

# Visualización del trail
*.gNodeB[0].mobility.displayTrail = true

# ============================================================================
# CONFIGURACIÓN 2: MÚLTIPLES gNodeBs CON RUTAS RECTANGULARES
# ============================================================================
[Config MultipleRectangularMobility]
extends = Area, MobileNetwork, Update, Visualization

# Tres gNodeBs
*.numGnbs = 3

# Configuración común para todos los gNodeBs
*.gNodeB[*].mobility.typename = "RectangleMobility"
*.gNodeB[*].mobility.initFromDisplayString = false
*.gNodeB[*].mobility.speed = 15mps
*.gNodeB[*].mobility.displayTrail = true

# gNodeB 0 - Ruta rectangular en la esquina superior izquierda
*.gNodeB[0].mobility.constraintAreaMinX = 100m
*.gNodeB[0].mobility.constraintAreaMinY = 100m
*.gNodeB[0].mobility.constraintAreaMaxX = 400m
*.gNodeB[0].mobility.constraintAreaMaxY = 300m
*.gNodeB[0].mobility.startPos = 0  # 0=random, 1-4=corners
*.gNodeB[0].coverageRange = 250m
*.gNodeB[0].coverageColor = "#ff0000"
*.gNodeB[0].coverageOpacity = 0.15

# gNodeB 1 - Ruta rectangular en el centro
*.gNodeB[1].mobility.constraintAreaMinX = 400m
*.gNodeB[1].mobility.constraintAreaMinY = 250m
*.gNodeB[1].mobility.constraintAreaMaxX = 800m
*.gNodeB[1].mobility.constraintAreaMaxY = 550m
*.gNodeB[1].mobility.startPos = 2
*.gNodeB[1].coverageRange = 280m
*.gNodeB[1].coverageColor = "#00ff00"
*.gNodeB[1].coverageOpacity = 0.15

# gNodeB 2 - Ruta rectangular en la esquina inferior derecha
*.gNodeB[2].mobility.constraintAreaMinX = 800m
*.gNodeB[2].mobility.constraintAreaMinY = 500m
*.gNodeB[2].mobility.constraintAreaMaxX = 1100m
*.gNodeB[2].mobility.constraintAreaMaxY = 700m
*.gNodeB[2].mobility.startPos = 3
*.gNodeB[2].coverageRange = 300m
*.gNodeB[2].coverageColor = "#0000ff"
*.gNodeB[2].coverageOpacity = 0.15

# ============================================================================
# CONFIGURACIÓN 3: MOVILIDAD CON WAYPOINTS (Puntos de inicio y final)
# ============================================================================
[Config WaypointMobility]
extends = Area, MobileNetwork, Update, Visualization

# Dos gNodeBs con rutas definidas por waypoints
*.numGnbs = 2

# gNodeB 0 - Ruta diagonal
*.gNodeB[0].mobility.typename = "TurtleMobility"
*.gNodeB[0].mobility.initFromDisplayString = false
*.gNodeB[0].mobility.turtleScript = xmldoc("mobility_routes.xml", "movements/route[@id='route1']")
*.gNodeB[0].coverageRange = 350m
*.gNodeB[0].coverageColor = "#ff00ff"
*.gNodeB[0].coverageOpacity = 0.2
*.gNodeB[0].mobility.displayTrail = true

# gNodeB 1 - Ruta en zigzag
*.gNodeB[1].mobility.typename = "TurtleMobility"
*.gNodeB[1].mobility.initFromDisplayString = false
*.gNodeB[1].mobility.turtleScript = xmldoc("mobility_routes.xml", "movements/route[@id='route2']")
*.gNodeB[1].coverageRange = 320m
*.gNodeB[1].coverageColor = "#00ffff"
*.gNodeB[1].coverageOpacity = 0.2
*.gNodeB[1].mobility.displayTrail = true

# ============================================================================
# CONFIGURACIÓN 4: MÚLTIPLES gNodeBs CON MOVILIDAD CIRCULAR
# ============================================================================
[Config CircularMobility]
extends = Area, MobileNetwork, Update, Visualization

# Cuatro gNodeBs en órbitas circulares
*.numGnbs = 4

*.gNodeB[*].mobility.typename = "CircleMobility"
*.gNodeB[*].mobility.initFromDisplayString = false
*.gNodeB[*].mobility.displayTrail = true

# gNodeB 0 - Órbita pequeña
*.gNodeB[0].mobility.cx = 300m
*.gNodeB[0].mobility.cy = 400m
*.gNodeB[0].mobility.r = 150m
*.gNodeB[0].mobility.speed = 10mps
*.gNodeB[0].mobility.startAngle = 0deg
*.gNodeB[0].coverageRange = 200m
*.gNodeB[0].coverageColor = "#ff0000"

# gNodeB 1 - Órbita media
*.gNodeB[1].mobility.cx = 600m
*.gNodeB[1].mobility.cy = 400m
*.gNodeB[1].mobility.r = 200m
*.gNodeB[1].mobility.speed = 12mps
*.gNodeB[1].mobility.startAngle = 90deg
*.gNodeB[1].coverageRange = 250m
*.gNodeB[1].coverageColor = "#00ff00"

# gNodeB 2 - Órbita grande
*.gNodeB[2].mobility.cx = 900m
*.gNodeB[2].mobility.cy = 400m
*.gNodeB[2].mobility.r = 250m
*.gNodeB[2].mobility.speed = 15mps
*.gNodeB[2].mobility.startAngle = 180deg
*.gNodeB[2].coverageRange = 300m
*.gNodeB[2].coverageColor = "#0000ff"

# gNodeB 3 - Órbita excéntrica
*.gNodeB[3].mobility.cx = 600m
*.gNodeB[3].mobility.cy = 200m
*.gNodeB[3].mobility.r = 180m
*.gNodeB[3].mobility.speed = 8mps
*.gNodeB[3].mobility.startAngle = 270deg
*.gNodeB[3].coverageRange = 280m
*.gNodeB[3].coverageColor = "#ffff00"

# Opacidad común para todos
*.gNodeB[*].coverageOpacity = 0.15

# ============================================================================
# CONFIGURACIÓN 5: MOVILIDAD LINEAL CON MÚLTIPLES gNodeBs Y VELOCIDADES DIFERENTES
# ============================================================================
[Config MultipleLinearSpeeds]
extends = Area, MobileNetwork, Update, Visualization

*.numGnbs = 3

# Todos usan movilidad lineal
*.gNodeB[*].mobility.typename = "LinearMobility"
*.gNodeB[*].mobility.initFromDisplayString = false
*.gNodeB[*].mobility.displayTrail = true

# gNodeB 0 - Lento, horizontal
*.gNodeB[0].mobility.speed = 10mps
*.gNodeB[0].mobility.initialMovementHeading = 0deg  # Este
*.gNodeB[0].mobility.initialX = 50m
*.gNodeB[0].mobility.initialY = 200m
*.gNodeB[0].coverageRange = 300m
*.gNodeB[0].coverageColor = "#ff0000"

# gNodeB 1 - Medio, diagonal
*.gNodeB[1].mobility.speed = 20mps
*.gNodeB[1].mobility.initialMovementHeading = 45deg  # Noreste
*.gNodeB[1].mobility.initialX = 50m
*.gNodeB[1].mobility.initialY = 400m
*.gNodeB[1].coverageRange = 280m
*.gNodeB[1].coverageColor = "#00ff00"

# gNodeB 2 - Rápido, vertical
*.gNodeB[2].mobility.speed = 30mps
*.gNodeB[2].mobility.initialMovementHeading = 90deg  # Norte
*.gNodeB[2].mobility.initialX = 50m
*.gNodeB[2].mobility.initialY = 600m
*.gNodeB[2].coverageRange = 250m
*.gNodeB[2].coverageColor = "#0000ff"

*.gNodeB[*].coverageOpacity = 0.2