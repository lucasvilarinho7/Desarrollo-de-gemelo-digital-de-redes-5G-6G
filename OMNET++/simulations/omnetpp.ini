[General]
output-scalar-file-append = false 
 
# Network configuration 
network = gnbrectilineo.MobileGNB
sim-time-limit = 350s 
warmup-period = 0.5s 

**.routingRecorder.enabled = false 
**.sctp.enableHeartbeats = false     
**.sctp.**.scalar-recording = false
**.sctp.**.vector-recording = false
**.sctp.nagleEnabled = false

  
 
*.configurator.config = xmldoc("network_config.xml") 

# ============ APLICACIONES EN EL SERVIDOR ============
*.server.numApps = 2

*.server.app[0].typename = "PositionReceiver"
*.server.app[0].localPort = 5000

*.server.app[1].typename = "TcpClient"
*.server.app[1].serverThreadModuleType = ""

# ============ ÁREA DE SIMULACIÓN ============
**.mobility.constraintAreaMaxX = 2000m 
**.mobility.constraintAreaMaxY = 2000m 
**.mobility.constraintAreaMinX = 0m 
**.mobility.constraintAreaMinY = 0m 
**.mobility.constraintAreaMinZ = 0m 
**.mobility.constraintAreaMaxZ = 150m 
**.mobility.initFromDisplayString = false 


# ========================================================
# CONFIGURACIÓN: PositionTracking con Métricas Reales
# ========================================================
[Config PositionTracking]

# ============ TOPOLOGÍA ============
*.numGnb = 2
*.numUe = 1

# ============ ESTACIONES BASE - POSICIONES ============
*.gNodeB[0].mobility.typename = "StationaryMobility"
*.gNodeB[0].mobility.initialX = 500m
*.gNodeB[0].mobility.initialY = 300m
*.gNodeB[0].mobility.initialZ = 25m

*.gNodeB[1].mobility.typename = "StationaryMobility"
*.gNodeB[1].mobility.initialX = 500m
*.gNodeB[1].mobility.initialY = 750m
*.gNodeB[1].mobility.initialZ = 25m

# ============ CONFIGURACIÓN DEL UE ============
*.ue[0].mobility.typename = "LinearMobility"
*.ue[0].mobility.initialX = 300m
*.ue[0].mobility.initialY = 200m
*.ue[0].mobility.initialZ = 1.5m
*.ue[0].mobility.speed = 15mps
*.ue[0].mobility.angle = 50deg
*.ue[0].mobility.updateInterval = 0.1s

# ============ PARÁMETROS DE RADIO ============
**.ueTxPower = 26
**.eNodeBTxPower = 46
**.numBands = 25

# CRÍTICO: Asociación celular dinámica habilitada
*.ue[0].cellularNic.nrPhy.dynamicCellAssociation = true

# CRÍTICO: IDs iniciales del UE deben coincidir con gNodeB[0]
*.ue[0].macCellId = 0        # Debe coincidir con gNodeB[0].macCellId
*.ue[0].masterId = 0        # Debe coincidir con gNodeB[0].macNodeId
*.ue[0].nrMacCellId = 1      # Cell ID inicial para NR
*.ue[0].nrMasterId = 1       # Master ID inicial para NR

# ============ CONFIGURACIÓN EXPLÍCITA DE CELL/NODE IDs ============
# CRÍTICO: macCellId y macNodeId deben ser IGUALES
**.gNodeB[0].macCellId = 1
**.gNodeB[0].macNodeId = 1
**.gNodeB[1].macCellId = 2
**.gNodeB[1].macNodeId = 2

# --- UE ---
*.ue[*].cellularNic.nrPhy.enableHandover = true

# --- gNodeB ---
*.gNodeB[*].cellularNic.phy.enableHandover = true
*.gNodeB[*].cellularNic.phy.handoverLatency = 50ms
*.gNodeB[*].cellInfo.broadcastMessageInterval = 1s

# X2 
*.gNodeB[*].numX2Apps = 1
*.gNodeB[*].x2App[*].server.localPort = 6000 + ancestorIndex(1)

# X2 connections
*.gNodeB[0].x2App[0].client.connectAddress = "gNodeB[1]%x2ppp0"
*.gNodeB[1].x2App[0].client.connectAddress = "gNodeB[0]%x2ppp0"

# ============ APLICACIÓN EN EL UE ============
*.ue[0].numApps = 1

*.ue[0].app[0].typename = "PositionSender"
*.ue[0].app[0].destAddress = "server"
*.ue[0].app[0].destPort = 5000
*.ue[0].app[0].localPort = -1
*.ue[0].app[0].startTime = uniform(0.01s,0.05s)
*.ue[0].app[0].sendInterval = 0.5s

# ============ NUEVO: APLICACIONES EN LOS gNodeBs ============
*.gNodeB[*].numApps = 1

*.gNodeB[*].app[0].typename = "GnbSender"
*.gNodeB[*].app[0].destAddress = "server"
*.gNodeB[*].app[0].destPort = 5000
*.gNodeB[*].app[0].localPort = -1
*.gNodeB[*].app[0].startTime = uniform(1.0s, 1.2s)
*.gNodeB[*].app[0].sendInterval = 2s  # Envío cada 2 segundos

############################################################
# ESCENARIO NUEVO: TurtleMobility con Handover Coordinado
# UE se mueve desde zona de gNB[0] hacia zona sin cobertura
# gNB[1] se desplaza para proveer cobertura
# UE regresa a punto inicial con handover automático
############################################################
[Config TurtleHandover]

*.numGnb = 2
*.numUe = 1

# ============ gNodeB[0] - ESTÁTICO EN CUADRANTE SUPERIOR IZQUIERDO ============
*.gNodeB[0].mobility.typename = "StationaryMobility"
*.gNodeB[0].mobility.initFromDisplayString = false
*.gNodeB[0].mobility.initialX = 400m    # Cuadrante superior izquierdo
*.gNodeB[0].mobility.initialY = 400m
*.gNodeB[0].mobility.initialZ = 25m

# ============ gNodeB[1] - MÓVIL CON TURTLEMOBILITY ============
# Inicia en esquina inferior derecha y se mueve según script
*.gNodeB[1].mobility.typename = "TurtleMobility"
*.gNodeB[1].mobility.turtleScript = xmldoc("mobility_routes.xml", "/movements/gnodeb1")
*.gNodeB[1].mobility.updateInterval = 0.1s

# ============ UE - MÓVIL CON TURTLEMOBILITY ============
# Inicia en zona de cobertura de gNodeB[0] (superior izquierdo)
*.ue[0].mobility.typename = "TurtleMobility"
*.ue[0].mobility.turtleScript = xmldoc("mobility_routes.xml", "/movements/ue")
*.ue[0].mobility.updateInterval = 0.1s

# ============ PARÁMETROS DE RADIO ============
**.ueTxPower = 26
**.eNodeBTxPower = 46
**.numBands = 25

# CRÍTICO: Asociación celular dinámica habilitada
*.ue[0].cellularNic.nrPhy.dynamicCellAssociation = true

# CRÍTICO: IDs iniciales del UE deben coincidir con gNodeB[0]
*.ue[0].macCellId = 0        # Debe coincidir con gNodeB[0].macCellId
*.ue[0].masterId = 0        # Debe coincidir con gNodeB[0].macNodeId
*.ue[0].nrMacCellId = 1      # Cell ID inicial para NR
*.ue[0].nrMasterId = 1       # Master ID inicial para NR

# ============ CONFIGURACIÓN EXPLÍCITA DE CELL/NODE IDs ============
# CRÍTICO: macCellId y macNodeId deben ser IGUALES
**.gNodeB[0].macCellId = 1
**.gNodeB[0].macNodeId = 1
**.gNodeB[1].macCellId = 2
**.gNodeB[1].macNodeId = 2

# --- UE ---
*.ue[*].cellularNic.nrPhy.enableHandover = true

# --- gNodeB ---
*.gNodeB[*].cellularNic.phy.enableHandover = true
*.gNodeB[*].cellularNic.phy.handoverLatency = 50ms
*.gNodeB[*].cellInfo.broadcastMessageInterval = 1s

# X2 
*.gNodeB[*].numX2Apps = 1
*.gNodeB[*].x2App[*].server.localPort = 6000 + ancestorIndex(1)

# X2 connections
*.gNodeB[0].x2App[0].client.connectAddress = "gNodeB[1]%x2ppp0"
*.gNodeB[1].x2App[0].client.connectAddress = "gNodeB[0]%x2ppp0"

# ============ APLICACIÓN EN EL UE ============
*.ue[0].numApps = 1

*.ue[0].app[0].typename = "PositionSender"
*.ue[0].app[0].destAddress = "server"
*.ue[0].app[0].destPort = 5000
*.ue[0].app[0].localPort = -1
*.ue[0].app[0].startTime = uniform(0.01s,0.05s)
*.ue[0].app[0].sendInterval = 0.5s

# ============ NUEVO: APLICACIONES EN LOS gNodeBs ============
*.gNodeB[*].numApps = 1

*.gNodeB[*].app[0].typename = "GnbSender"
*.gNodeB[*].app[0].destAddress = "server"
*.gNodeB[*].app[0].destPort = 5000
*.gNodeB[*].app[0].localPort = -1
*.gNodeB[*].app[0].startTime = uniform(1.0s, 1.2s)
*.gNodeB[*].app[0].sendInterval = 2s  # Envío cada 2 segundos

############################################################
# ESCENARIO FINAL: 2 gNB móviles y 1 UE estático
############################################################
[Config MobileGnbHandover]

*.numGnb = 2
*.numUe = 1

*.gNodeB[0].mobility.typename = "LinearMobility"
*.gNodeB[0].mobility.initFromDisplayString = false
*.gNodeB[0].mobility.speed = 20mps

# Ruta del gNB0:
# 1. Empieza cerca del UE (100,300)
# 2. Se aleja hacia la derecha (900,300)
# 3. Regresa al punto inicial

*.gNodeB[0].mobility.numWaypoints = 3
*.gNodeB[0].mobility.waypoint[0].x = 100m
*.gNodeB[0].mobility.waypoint[0].y = 300m
*.gNodeB[0].mobility.waypoint[0].z = 25m

*.gNodeB[0].mobility.waypoint[1].x = 900m
*.gNodeB[0].mobility.waypoint[1].y = 300m
*.gNodeB[0].mobility.waypoint[1].z = 25m

*.gNodeB[0].mobility.waypoint[2].x = 100m
*.gNodeB[0].mobility.waypoint[2].y = 300m
*.gNodeB[0].mobility.waypoint[2].z = 25m

*.gNodeB[1].mobility.typename = "LinearMobility"
*.gNodeB[1].mobility.initFromDisplayString = false
*.gNodeB[1].mobility.speed = 20mps

# Ruta del gNB1:
# 1. Empieza lejos del UE (900,300)
# 2. Se acerca al UE (100,300)
# 3. Vuelve a alejarse

*.gNodeB[1].mobility.numWaypoints = 3
*.gNodeB[1].mobility.waypoint[0].x = 900m
*.gNodeB[1].mobility.waypoint[0].y = 300m
*.gNodeB[1].mobility.waypoint[0].z = 25m

*.gNodeB[1].mobility.waypoint[1].x = 100m
*.gNodeB[1].mobility.waypoint[1].y = 300m
*.gNodeB[1].mobility.waypoint[1].z = 25m

*.gNodeB[1].mobility.waypoint[2].x = 900m
*.gNodeB[1].mobility.waypoint[2].y = 300m
*.gNodeB[1].mobility.waypoint[2].z = 25m

# UE estático
*.ue[0].mobility.typename = "StationaryMobility"
*.ue[0].mobility.initFromDisplayString = false
*.ue[0].mobility.initialX = 500m
*.ue[0].mobility.initialY = 300m
*.ue[0].mobility.initialZ = 1.5m

