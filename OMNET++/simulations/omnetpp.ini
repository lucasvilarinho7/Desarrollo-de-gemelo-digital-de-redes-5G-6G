[General]
#------------------------------------------------------------------------------
# 1. PARAMETROS DE SIMULACION
#------------------------------------------------------------------------------
network                   = dronenetwork.DroneNetwork
sim-time-limit            = 120s        # ventana suficiente para converger
warmup-period             = 0.5s        # descarta transitorios de arranque
seed-set                  = 0           # semilla fija -> trayectorias UE iguales
                                        # en las 3 campanas (comparabilidad)

# Desactivar registros no usados (aligera la simulacion)
**.routingRecorder.enabled  = false
**.sctp.enableHeartbeats    = false
**.sctp.**.scalar-recording = false
**.sctp.**.vector-recording = false
**.sctp.nagleEnabled        = false

#------------------------------------------------------------------------------
# 2. CONFIGURADOR DE RED (IPv4 / backhaul)
#------------------------------------------------------------------------------
*.configurator.config                         = xmldoc("network_config.xml")
*.configurator.addStaticRoutes                = true
*.configurator.addDefaultRoutes               = true
*.configurator.assignDisjunctSubnetAddresses  = true

#------------------------------------------------------------------------------
# 3. TOPOLOGIA (comun a las 3 campanas)
#------------------------------------------------------------------------------
# 3 estaciones: minimo que deja huecos en estatico y permite clustering no trivial.
# 6 usuarios:   3 clusters espaciales; carga agregada 150 Mbit/s >> capacidad.
*.numGnb = 3
*.numUe  = 6

#------------------------------------------------------------------------------
# 4. AREA DE SIMULACION (entorno fisico)
#------------------------------------------------------------------------------
**.mobility.constraintAreaMinX    = 0m
**.mobility.constraintAreaMinY    = 0m
**.mobility.constraintAreaMinZ    = 0m
**.mobility.constraintAreaMaxX    = 2000m
**.mobility.constraintAreaMaxY    = 2000m
**.mobility.constraintAreaMaxZ    = 150m
**.mobility.initFromDisplayString = false

#------------------------------------------------------------------------------
# 5. PORTADORA Y RECURSOS RADIO (5G NR FR1)
#------------------------------------------------------------------------------
# Banda n7 (2.6 GHz), 20 MHz = 52 RB, numerologia mu=0 (SCS 15 kHz).
# Fijar frecuencia y numerologia explicitamente hace el path loss reproducible.
*.carrierAggregation.componentCarrier[0].carrierFrequency = 2.6GHz
*.carrierAggregation.componentCarrier[0].numBands         = 52
*.carrierAggregation.componentCarrier[0].numerologyIndex  = 0

#------------------------------------------------------------------------------
# 6. POTENCIAS DE TRANSMISION
#------------------------------------------------------------------------------
**.ueTxPower     = 23     # dBm - UE 5G NR Clase 3 estandar
**.eNodeBTxPower = 46     # dBm - gNodeB UAV (~40 W), nivel macrocelda

#------------------------------------------------------------------------------
# 7. MODELO DE CANAL REALISTA (entorno urbano denso)
#------------------------------------------------------------------------------
# Path loss urbano + shadowing log-normal + fast fading (Jakes) + LoS dinamico.
# Es lo que hace que la POSICION de las estaciones afecte al SINR percibido.
**.scenario             = "URBAN_MACROCELL"
**.shadowing            = true
**.correlation_distance = 50
**.fading               = true
**.fading_type          = "JAKES"
**.dynamic_los          = true

#------------------------------------------------------------------------------
# 8. ASOCIACION CELULAR Y ADAPTACION DE ENLACE
#------------------------------------------------------------------------------
# CRITICO: el UE reelige la mejor celda por SINR. Sin esto, mover estaciones
# no cambiaria la asociacion y la comparacion entre algoritmos no tendria sentido.
*.ue[*].cellularNic.nrPhy.dynamicCellAssociation = true
*.ue[*].masterId    = 0    # ignorado al estar activa la asociacion dinamica
*.ue[*].macCellId   = 0
*.ue[*].nrMasterId  = 1
*.ue[*].nrMacCellId = 1

# BLER objetivo (adaptacion de enlace realista)
*.gNodeB[*].cellularNic.nrPhy.targetBler = 0.1
*.ue[*].cellularNic.nrPhy.targetBler     = 0.1

#------------------------------------------------------------------------------
# 9. HANDOVER (continuidad de servicio con nodos moviles)
#------------------------------------------------------------------------------
*.ue[*].cellularNic.nrPhy.enableHandover      = true
*.gNodeB[*].cellularNic.phy.enableHandover    = true
*.gNodeB[*].cellularNic.phy.handoverLatency   = 50ms    # tipico 5G NR
*.gNodeB[*].cellInfo.broadcastMessageInterval = 1s      # agilidad vs senalizacion

# IDs de celda/nodo (necesarios para handover con 3 estaciones)
**.gNodeB[0].macCellId = 1
**.gNodeB[0].macNodeId = 1
**.gNodeB[1].macCellId = 2
**.gNodeB[1].macNodeId = 2
**.gNodeB[2].macCellId = 3
**.gNodeB[2].macNodeId = 3

# Interfaz X2 en malla completa (transferencia de contexto entre estaciones)
*.gNodeB[*].numX2Apps = 2
*.gNodeB[*].x2App[*].server.localPort = 6000 + ancestorIndex(1)
*.gNodeB[0].x2App[0].client.connectAddress = "gNodeB[1]%x2ppp0"
*.gNodeB[0].x2App[1].client.connectAddress = "gNodeB[2]%x2ppp0"
*.gNodeB[1].x2App[0].client.connectAddress = "gNodeB[0]%x2ppp0"
*.gNodeB[1].x2App[1].client.connectAddress = "gNodeB[2]%x2ppp0"
*.gNodeB[2].x2App[0].client.connectAddress = "gNodeB[0]%x2ppp0"
*.gNodeB[2].x2App[1].client.connectAddress = "gNodeB[1]%x2ppp0"

#------------------------------------------------------------------------------
# 10. MOVILIDAD DE LOS USUARIOS (comun a las 3 campanas)
#------------------------------------------------------------------------------
# Trayectorias LINEALES y deterministas (no aleatorias) para que los 6 UE
# recorran lo mismo en las 3 campanas -> las diferencias se deben SOLO al
# algoritmo de reposicionamiento.
#
# Distribucion en 3 clusters (origen arriba-izquierda):
#   Cluster A (UE 0,1): superior-izquierda  -> zona INFRA-servida en estatico
#   Cluster B (UE 2,3): centro-derecha
#   Cluster C (UE 4,5): inferior-centro
*.ue[*].mobility.typename      = "LinearMobility"
*.ue[*].mobility.initialZ      = 1.5m       # altura de terminal a nivel suelo
*.ue[*].mobility.speed         = 5mps       # peaton/movilidad baja
*.ue[*].mobility.updateInterval = 0.1s

# -- Cluster A: superior-izquierda (lejos de toda estacion en estatico) --
*.ue[0].mobility.initialX = 250m
*.ue[0].mobility.initialY = 300m
*.ue[0].mobility.angle    = 30deg
*.ue[1].mobility.initialX = 450m
*.ue[1].mobility.initialY = 200m
*.ue[1].mobility.angle    = 60deg

# -- Cluster B: centro-derecha --
*.ue[2].mobility.initialX = 1600m
*.ue[2].mobility.initialY = 900m
*.ue[2].mobility.angle    = 150deg
*.ue[3].mobility.initialX = 1750m
*.ue[3].mobility.initialY = 650m
*.ue[3].mobility.angle    = 200deg

# -- Cluster C: inferior-centro --
*.ue[4].mobility.initialX = 1000m
*.ue[4].mobility.initialY = 1700m
*.ue[4].mobility.angle    = 300deg
*.ue[5].mobility.initialX = 1300m
*.ue[5].mobility.initialY = 1650m
*.ue[5].mobility.angle    = 330deg

#------------------------------------------------------------------------------
# 11. APLICACIONES
#------------------------------------------------------------------------------
# UE: app[0] UESender (telemetria pos+SINR al gemelo) / app[1] generador UL.
# El "VoIPSender" se usa como GENERADOR DE TASA constante (25 Mbit/s), no como
# VoIP representativo: PacketSize 1250 B cada 0.4 ms = 25 Mbit/s por UE.
*.ue[*].numApps = 2

*.ue[*].app[0].typename = "UESender"
*.ue[*].app[0].destAddress = "server"
*.ue[*].app[0].destPort = 5000
*.ue[*].app[0].localPort = -1
*.ue[*].app[0].sendInterval = 0.5s

*.ue[0].app[1].typename = "VoIPSender" 
*.ue[0].app[1].destAddress = "server" 
*.ue[0].app[1].destPort = 3000 
*.ue[0].app[1].localPort = -1 
*.ue[0].app[1].PacketSize = 1250 # bytes 
*.ue[0].app[1].sampling_time = 0.0004s # 25 mbps 
*.ue[0].app[1].silences = false 
*.ue[0].app[1].startTime = 0.5s

*.ue[1].app[1].typename = "VoIPSender" 
*.ue[1].app[1].destAddress = "server" 
*.ue[1].app[1].destPort = 3001 
*.ue[1].app[1].localPort = -1 
*.ue[1].app[1].PacketSize = 1250 # bytes 
*.ue[1].app[1].sampling_time = 0.0004s # 25 mbps 
*.ue[1].app[1].silences = false 
*.ue[1].app[1].startTime = 0.5s


*.ue[2].app[1].typename = "VoIPSender" 
*.ue[2].app[1].destAddress = "server" 
*.ue[2].app[1].destPort = 3002 
*.ue[2].app[1].localPort = -1 
*.ue[2].app[1].PacketSize = 1250 # bytes 
*.ue[2].app[1].sampling_time = 0.0004s # 25 mbps 
*.ue[2].app[1].silences = false 
*.ue[2].app[1].startTime = 0.5s

*.ue[3].app[1].typename = "VoIPSender" 
*.ue[3].app[1].destAddress = "server" 
*.ue[3].app[1].destPort = 3003 
*.ue[3].app[1].localPort = -1 
*.ue[3].app[1].PacketSize = 1250 # bytes 
*.ue[3].app[1].sampling_time = 0.0004s # 25 mbps 
*.ue[3].app[1].silences = false 
*.ue[3].app[1].startTime = 0.5s

*.ue[4].app[1].typename = "VoIPSender" 
*.ue[4].app[1].destAddress = "server" 
*.ue[4].app[1].destPort = 3004 
*.ue[4].app[1].localPort = -1 
*.ue[4].app[1].PacketSize = 1250 # bytes 
*.ue[4].app[1].sampling_time = 0.0004s # 25 mbps 
*.ue[4].app[1].silences = false 
*.ue[4].app[1].startTime = 0.5s

*.ue[5].app[1].typename = "VoIPSender" 
*.ue[5].app[1].destAddress = "server" 
*.ue[5].app[1].destPort = 3005 
*.ue[5].app[1].localPort = -1 
*.ue[5].app[1].PacketSize = 1250 # bytes 
*.ue[5].app[1].sampling_time = 0.0004s # 25 mbps 
*.ue[5].app[1].silences = false 
*.ue[5].app[1].startTime = 0.5s

# gNodeB: telemetria de su propia posicion hacia el gemelo digital
*.gNodeB[*].numApps = 1
*.gNodeB[*].app[0].typename     = "GnbSender"
*.gNodeB[*].app[0].destAddress  = "server"
*.gNodeB[*].app[0].destPort     = 5000
*.gNodeB[*].app[0].localPort    = -1
*.gNodeB[*].app[0].sendInterval = 0.5s

# ============ APLICACIONES EN EL SERVIDOR ============
*.server.numApps = 8

*.server.app[0].typename = "Receiver"
*.server.app[0].localPort = 5000
	
*.server.app[1].typename = "TcpClient"
*.server.app[1].serverThreadModuleType = ""

*.server.app[2].typename = "VoIPReceiver" 
*.server.app[2].localPort = 3000

*.server.app[3].typename = "VoIPReceiver" 
*.server.app[3].localPort = 3001

*.server.app[4].typename = "VoIPReceiver" 
*.server.app[4].localPort = 3002

*.server.app[5].typename = "VoIPReceiver" 
*.server.app[5].localPort = 3003

*.server.app[6].typename = "VoIPReceiver" 
*.server.app[6].localPort = 3004

*.server.app[7].typename = "VoIPReceiver" 
*.server.app[7].localPort = 3005


#==============================================================================
#  CAMPANA 1 — ESTACIONES ESTATICAS (REFERENCIA / LINEA BASE)
#==============================================================================
#  Las 3 estaciones permanecen FIJAS. El triangulo de estaciones cubre bien los
#  clusters B y C (a ~220-260 m) pero deja el cluster A (superior-izquierda) a
#  ~560-600 m de la estacion mas cercana: zona de cobertura degradada DONDE SI
#  hay usuarios. Es la referencia contra la que se miden las otras dos campanas.
#==============================================================================
[Config Estatico]
description = "Estaciones fijas - linea base de cobertura"

*.gNodeB[*].mobility.typename = "StationaryMobility"
*.gNodeB[*].mobility.initialZ = 25m

*.gNodeB[0].mobility.initialX = 700m
*.gNodeB[0].mobility.initialY = 700m

*.gNodeB[1].mobility.initialX = 1500m
*.gNodeB[1].mobility.initialY = 700m

*.gNodeB[2].mobility.initialX = 1100m
*.gNodeB[2].mobility.initialY = 1500m


#==============================================================================
#  CAMPANA 2 — REPOSICIONAMIENTO POR CENTROIDES
#==============================================================================
#  Misma posicion inicial que en estatico, pero ahora las estaciones usan
#  SupervisedMobility: el gemelo digital (DroneController) las reubica hacia el
#  centroide de los UEs que cada una sirve. Deberian migrar hacia:
#     Cluster A (350,250) | Cluster B (1675,775) | Cluster C (1150,1675)
#==============================================================================
[Config Centroides]
description = "Reposicionamiento reactivo por centroide de UEs servidos"

*.gNodeB[*].mobility.typename       = "SupervisedMobility"
*.gNodeB[*].mobility.initialZ       = 25m
*.gNodeB[*].mobility.defaultSpeed   = 20mps
*.gNodeB[*].mobility.updateInterval = 0.1s

*.gNodeB[0].mobility.initialX = 700m
*.gNodeB[0].mobility.initialY = 700m

*.gNodeB[1].mobility.initialX = 1500m
*.gNodeB[1].mobility.initialY = 700m

*.gNodeB[2].mobility.initialX = 1100m
*.gNodeB[2].mobility.initialY = 1500m

[Config CentroidesPonderados]
description = "Reposicionamiento reactivo por centroide ponderado de UEs servidos"

*.gNodeB[*].mobility.typename       = "SupervisedMobility"
*.gNodeB[*].mobility.initialZ       = 25m
*.gNodeB[*].mobility.defaultSpeed   = 20mps
*.gNodeB[*].mobility.updateInterval = 0.1s

*.gNodeB[0].mobility.initialX = 700m
*.gNodeB[0].mobility.initialY = 700m

*.gNodeB[1].mobility.initialX = 1500m
*.gNodeB[1].mobility.initialY = 700m

*.gNodeB[2].mobility.initialX = 1100m
*.gNodeB[2].mobility.initialY = 1500m


#==============================================================================
#  CAMPANA 3 — REPOSICIONAMIENTO POR K-MEANS
#==============================================================================
#  Identica a Centroides en topologia y posicion inicial. La diferencia esta en
#  el gemelo digital, que agrupa los UEs por k-means PONDERADO por calidad de
#  senal (mas peso a las zonas peor cubiertas) y asigna cada estacion al centro
#  del cluster. El reparto es global, no puramente reactivo.
#
#  NOTA: el algoritmo se selecciona en el gemelo digital (script Python). Esta
#  campana debe ejecutarse con el gemelo configurado en modo k-means.
#==============================================================================
[Config KMeans]
description = "Reposicionamiento global por k-means ponderado por SINR"

*.gNodeB[*].mobility.typename       = "SupervisedMobility"
*.gNodeB[*].mobility.initialZ       = 25m
*.gNodeB[*].mobility.defaultSpeed   = 20mps
*.gNodeB[*].mobility.updateInterval = 0.1s

*.gNodeB[0].mobility.initialX = 700m
*.gNodeB[0].mobility.initialY = 700m

*.gNodeB[1].mobility.initialX = 1500m
*.gNodeB[1].mobility.initialY = 700m

*.gNodeB[2].mobility.initialX = 1100m
*.gNodeB[2].mobility.initialY = 1500m