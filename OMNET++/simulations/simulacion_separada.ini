[General]
output-scalar-file-append = false 
 
# Network configuration 
network = gnbrectilineo.MobileGNB
sim-time-limit = 120s 
warmup-period = 0.5s 

**.routingRecorder.enabled = false 
**.sctp.enableHeartbeats = false     
**.sctp.**.scalar-recording = false
**.sctp.**.vector-recording = false
**.sctp.nagleEnabled = false

  
 
#*.configurator.config = xmldoc("network_config.xml") 


#*.configurator.addStaticRoutes = true
#*.configurator.addDefaultRoutes = true
#*.configurator.assignDisjunctSubnetAddresses = true


# ============ APLICACIONES EN EL SERVIDOR ============
*.server.numApps = 8

*.server.app[0].typename = "PositionReceiver"
*.server.app[0].localPort = 5000

*.server.app[1].typename = "TcpClient"
*.server.app[1].serverThreadModuleType = ""

*.server.app[2].typename = "VoIPReceiver" 
*.server.app[2].localPort = 3000

*.server.app[3].typename = "VoIPReceiver" 
*.server.app[3].localPort = 3001

*.server.app[4].typename = "VoIPReceiver" 
*.server.app[4].localPort = 3002

*.server.app[5].typename = "VoIPReceiver" 
*.server.app[5].localPort = 3003

*.server.app[6].typename = "VoIPReceiver" 
*.server.app[6].localPort = 3004

*.server.app[7].typename = "VoIPReceiver" 
*.server.app[7].localPort = 3005

# ============ ÁREA DE SIMULACIÓN ============
**.mobility.constraintAreaMaxX = 2000m 
**.mobility.constraintAreaMaxY = 2000m 
**.mobility.constraintAreaMinX = 0m 
**.mobility.constraintAreaMinY = 0m 
**.mobility.constraintAreaMinZ = 0m 
**.mobility.constraintAreaMaxZ = 150m 
**.mobility.initFromDisplayString = false 


# ========================================================
# CONFIGURACIÓN: PositionTracking con Métricas Reales
# ========================================================
[Config PositionTracking]

# ============ TOPOLOGÍA ============
*.numGnb = 3
*.numUe = 6

# ============ ESTACIONES BASE - POSICIONES ============
*.gNodeB[0].mobility.typename = "SupervisedMobility"
*.gNodeB[0].mobility.initialX = 500m
*.gNodeB[0].mobility.initialY = 500m
*.gNodeB[0].mobility.initialZ = 25m
*.gNodeB[0].mobility.updateInterval = 0.1s

*.gNodeB[1].mobility.typename = "SupervisedMobility"
*.gNodeB[1].mobility.initialX = 1700m
*.gNodeB[1].mobility.initialY = 1700m
*.gNodeB[1].mobility.initialZ = 25m
*.gNodeB[1].mobility.updateInterval = 0.1s

*.gNodeB[2].mobility.typename = "SupervisedMobility"
*.gNodeB[2].mobility.initialX = 1700m
*.gNodeB[2].mobility.initialY = 500m
*.gNodeB[2].mobility.initialZ = 25m
*.gNodeB[2].mobility.updateInterval = 0.1s

# ============ CONFIGURACIÓN DEL UE ============
*.ue[0].mobility.typename = "RandomWaypointMobility"
*.ue[0].mobility.initialX = 1200m
*.ue[0].mobility.initialY = 1200m
*.ue[0].mobility.initialZ = 1.5m
*.ue[0].mobility.speed = 13mps

*.ue[1].mobility.typename = "RandomWaypointMobility"
*.ue[1].mobility.initialX = 1600m
*.ue[1].mobility.initialY = 1200m
*.ue[1].mobility.initialZ = 1.5m
*.ue[1].mobility.speed = 13mps

*.ue[2].mobility.typename = "RandomWaypointMobility"
*.ue[2].mobility.initialX = 1200m
*.ue[2].mobility.initialY = 1200m
*.ue[2].mobility.initialZ = 1.5m
*.ue[2].mobility.speed = 13mps

*.ue[3].mobility.typename = "RandomWaypointMobility"
*.ue[3].mobility.initialX = 1200m
*.ue[3].mobility.initialY = 1600m
*.ue[3].mobility.initialZ = 1.5m
*.ue[3].mobility.speed = 13mps

*.ue[4].mobility.typename = "RandomWaypointMobility"
*.ue[4].mobility.initialX = 1000m
*.ue[4].mobility.initialY = 1000m
*.ue[4].mobility.initialZ = 1.5m
*.ue[4].mobility.speed = 13mps

*.ue[5].mobility.typename = "RandomWaypointMobility"
*.ue[5].mobility.initialX = 1800m
*.ue[5].mobility.initialY = 1800m
*.ue[5].mobility.initialZ = 1.5m
*.ue[5].mobility.speed = 13mps



# ============ PARÁMETROS DE RADIO ============
**.ueTxPower = 26
**.eNodeBTxPower = 46
**.numBands = 25

# CRÍTICO: Asociación celular dinámica habilitada
*.ue[*].cellularNic.nrPhy.dynamicCellAssociation = true

# CRÍTICO: IDs iniciales del UE deben coincidir con gNodeB[0]
*.ue[*].macCellId = 0        # Debe coincidir con gNodeB[0].macCellId
*.ue[*].masterId = 0        # Debe coincidir con gNodeB[0].macNodeId
*.ue[*].nrMacCellId = 1      # Cell ID inicial para NR
*.ue[*].nrMasterId = 1       # Master ID inicial para NR

# ============ CONFIGURACIÓN EXPLÍCITA DE CELL/NODE IDs ============
# CRÍTICO: macCellId y macNodeId deben ser IGUALES
**.gNodeB[0].macCellId = 1
**.gNodeB[0].macNodeId = 1
**.gNodeB[1].macCellId = 2
**.gNodeB[1].macNodeId = 2

# --- UE ---
*.ue[*].cellularNic.nrPhy.enableHandover = true

# --- gNodeB ---
*.gNodeB[*].cellularNic.phy.enableHandover = true
*.gNodeB[*].cellularNic.phy.handoverLatency = 50ms
*.gNodeB[*].cellInfo.broadcastMessageInterval = 1s

# X2 
*.gNodeB[*].numX2Apps = 2
*.gNodeB[*].x2App[*].server.localPort = 6000 + ancestorIndex(1)

# X2 connections (full mesh)
*.gNodeB[0].x2App[0].client.connectAddress = "gNodeB[1]%x2ppp0"
*.gNodeB[0].x2App[1].client.connectAddress = "gNodeB[2]%x2ppp0"

*.gNodeB[1].x2App[0].client.connectAddress = "gNodeB[0]%x2ppp0"
*.gNodeB[1].x2App[1].client.connectAddress = "gNodeB[2]%x2ppp0"

*.gNodeB[2].x2App[0].client.connectAddress = "gNodeB[0]%x2ppp0"
*.gNodeB[2].x2App[1].client.connectAddress = "gNodeB[1]%x2ppp0"

# ============ APLICACIÓN EN EL UE ============
*.ue[*].numApps = 2

*.ue[*].app[0].typename = "PositionSender"
*.ue[*].app[0].destAddress = "server"
*.ue[*].app[0].destPort = 5000
*.ue[*].app[0].localPort = -1
*.ue[*].app[0].sendInterval = 0.5s

*.ue[0].app[1].typename = "VoIPSender" 
*.ue[0].app[1].destAddress = "server" 
*.ue[0].app[1].destPort = 3000 
*.ue[0].app[1].localPort = -1 
*.ue[0].app[1].PacketSize = 1250 # bytes 
*.ue[0].app[1].sampling_time = 0.0004s # 25 mbps 
*.ue[0].app[1].silences = false 
*.ue[0].app[1].startTime = 0.5s

