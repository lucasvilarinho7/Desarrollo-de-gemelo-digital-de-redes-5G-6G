[General]
network = socketreal.simulations.SocketRealNetwork
sim-time-limit = 1000s

# Configuración del servidor TCP con socket real
*.server.numApps = 1
*.server.app[0].typename = "TcpServer"
*.server.app[0].serverThreadModuleType = ""  # Vacío porque usamos sockets reales

# No necesita configuración de IP porque usa socket del SO
*.server.hasTcp = false  # No usamos el TCP de INET, usamos socket real

# Log
**.verbose = true